server {
    listen 80;
    server_name ${NGINX_HOST};
    root /var/www/html/default;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name media.${NGINX_HOST};
    root /var/www/html/media;

    location / {
        try_files $uri =404;
    }

    location /videos/ {
        internal;
        alias /var/www/html/media/video/get/;
    }
}

