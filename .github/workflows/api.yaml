name: Simple Video Hosting - API Server

on:
  push:
    branches: [ main ]
    paths:
    - 'api/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build image
      uses: docker/build-push-action@v5
      with:
        context: ./api
        push: true
        platforms: linux/amd64
        cache-from: type=registry,ref=ghcr.io/sverdlovsky/svh-api:cache
        cache-to: type=registry,ref=ghcr.io/sverdlovsky/svh-api:cache,mode=max
        tags: |
          ghcr.io/sverdlovsky/svh-api:latest
          ghcr.io/sverdlovsky/svh-api:0.1.0

