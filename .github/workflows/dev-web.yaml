name: Simple Video Hosting - Web Server (Dev branch)

on:
  push:
    branches: [ dev ]
    paths:
    - 'web/**'

jobs:
  build:
    runs-on: [ self-hosted, linux, x64 ]

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Login to GHCR
      run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Build image
      run: podman build -t ghcr.io/sverdlovsky/svh-web:dev web

    - name: Push image
      run: podman push ghcr.io/sverdlovsky/svh-web:dev

